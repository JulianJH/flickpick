<!-- Option C: "Diagonal split" — badge cut in half like a card mid-swipe, eye spans the seam -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="badge"><rect width="64" height="64" rx="14"/></clipPath>
  </defs>
  <g clip-path="url(#badge)">
    <rect width="64" height="64" fill="#1a1a1a"/>
    <path d="M0 64 L64 0 L64 64 Z" fill="#00c030"/>
  </g>

  <!-- eye, centered on the diagonal seam -->
  <path d="M18 32 Q32 16 46 32 Q32 48 18 32 Z" fill="#e8e8e8"/>
  <circle cx="32" cy="32" r="4.2" fill="#00c030"/>
  <circle cx="32" cy="32" r="2.7" fill="#e8e8e8"/>

  <!-- trio dots, small cluster in the dark corner -->
  <circle cx="14" cy="50" r="1.9" fill="#00e054"/>
  <circle cx="19.2" cy="50" r="1.9" fill="#ff8000"/>
  <circle cx="24.4" cy="50" r="1.9" fill="#40bcf4"/>
</svg>
